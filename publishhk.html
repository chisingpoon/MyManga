<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>香港版漫畫資料</title>

<style>
body {
  font-family: Arial;
  padding: 30px;
  background: #f5f5f5;
}

.controls {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.controls input,
.controls select {
  padding: 8px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

@media (max-width: 768px) {

  .controls {
    flex-direction: column;
    align-items: stretch;
  }

  .controls input,
  .controls select {
    width: 100%;
    font-size: 16px;   /* better for touch */
  }

}
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 15px;
  border-bottom: 2px solid #eee;
}

.site-title {
  margin: 0;
  font-size: 24px;
}

.header-link {
  text-decoration: none;
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 6px;
  background: #f5f5f5;
  color: #333;
  transition: 0.2s ease;
}

.header-link:hover {
  background: #333;
  color: white;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 8px;
  padding: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  position: relative;
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 6px;
}

.price {
  color: green;
  font-weight: bold;
  margin-top: 5px;
}

.card .click-hint {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.7);
  color: white;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
  display: none; /* Initially hidden */
}

.card:hover .click-hint {
  display: block; /* Show hint on hover */
}

.detail-container {
  display: flex;
  gap: 20px;
  align-items: stretch;  /* important */
}

.detail-left {
  width: 35%;
}

.detail-left img {
  width: 100%;
  height: 100%;
  object-fit: contain;   /* show full image */
  display: block;
}

.detail-right {
  width: 65%;
}

.detail-row {
  margin-bottom: 8px;
}

.detail-description {
  margin-top: 15px;
}

.detail-description p {
  margin-top: 5px;
  line-height: 1.6;
}

.modal-content {
  display: flex;
  flex-direction: column;
}

.modal-box {
  background: white;
  width: 90%;
  max-width: 900px;
  margin: 5% auto;
  padding: 20px;
  border-radius: 8px;
  position: relative;
  display: flex;
}

#pagination button {
  margin: 0 4px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 4px;
}

#pagination button:hover:not(:disabled) {
  background: #f0f0f0;
}

#pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.active-page {
  background: #333 !important;
  color: white;
  font-weight: bold;
}

#pagination {
  margin-top: 20px;
  text-align: center;
}

#pagination button {
  margin: 0 4px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 4px;
}

#pagination button:hover:not(:disabled) {
  background: #f0f0f0;
}

#pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.active-page {
  background: #333 !important;
  color: white;
  font-weight: bold;
}

.ellipsis {
  margin: 0 6px;
  color: #888;
}

#detailContent {
  width: 100%;
}

.layout {
  display: flex;
  gap: 20px;
}

.sidebar {
  width: 260px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  height: fit-content;
}

.sidebar h3 {
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 14px;
}

.sidebar input,
.sidebar select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.sidebar {
  font-size: 13px;
}

.sidebar label {
  margin-bottom: 3px;
}

.sidebar label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-size: 13px;
  cursor: pointer;
}

.sidebar input[type="checkbox"] {
  width: auto;
  margin: 0;
}

#searchInput {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 8px;
  font-size: 13px;
  margin-bottom: 8px;
}

.content {
  flex: 1;
}

/* Mobile */
@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }
}

/* Collapsible filter styling */
.sidebar details {
  margin-bottom: 10px;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}

.sidebar summary {
  font-weight: bold;
  cursor: pointer;
  list-style: none;
  font-size: 14px;
  margin-bottom: 6px;
}

.sidebar summary::-webkit-details-marker {
  display: none;
}

.sidebar summary::after {
  content: "▾";
  float: right;
  transition: transform 0.2s ease;
}

.sidebar details[open] summary::after {
  transform: rotate(180deg);
}

/* Search Wrapper */
.search-wrapper {
  position: relative;
  margin-bottom: 6px;
}

.search-wrapper input {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 28px 6px 28px;
  font-size: 13px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Clear button */
#clearFiltersBtn:hover {
  background: #f0f0f0;
}
  
.clear-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  cursor: pointer;
  color: #888;
  display: none;
}

.clear-btn:hover {
  color: #000;
}

/* Result counter */
.result-count {
  font-size: 12px;
  color: #666;
  margin-bottom: 10px;
}

.filter-group {
  max-height: 250px;   /* scroll if long */
  overflow-y: auto;
  padding-right: 5px;
}
</style>
</head>

<body>

<header class="page-header">
  <div class="header-left">
    <h1 class="site-title">香港版漫畫資料</h1>
  </div>

  <div class="header-right">
    <a href="publishjp.html" class="header-link">日本版漫畫資料</a>
    <a href="alloriginalworks.html" class="header-link">日本原作資料</a>
  </div>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <button id="clearFiltersBtn" onclick="clearAllFilters()" style="margin-bottom:10px; width:100%; padding:6px 0; font-size:13px; border-radius:6px; border:1px solid #ccc; cursor:pointer;">
      清除所有篩選
    </button>
  
    <h3>排序</h3>
    <select id="sortIssueDate" onchange="applyFilters()">
      <option value="">按出版日期</option>
      <option value="newest">從新到舊</option>
      <option value="oldest">從舊到新</option>
    </select>

    <select id="sortPrice" onchange="applyFilters()">
      <option value="">按售價</option>
      <option value="low">從低到高</option>
      <option value="high">從高到低</option>
    </select>

    <h3>搜尋</h3>
    <div class="search-wrapper">
      <input type="text"
             id="searchInput"
             placeholder="任何文字搜尋..."
             oninput="handleSearchInput()">
      <span class="clear-btn" onclick="clearSearch()">×</span>
    </div>
    <div id="resultCount" class="result-count"></div>
    
    <details>
      <summary>書名</summary>
      <div id="titleFilter" class="filter-group"></div>
    </details>
    
    <details>
      <summary>出版社</summary>
      <div id="publisherFilter" class="filter-group"></div>
    </details>

    <details>
      <summary>作者</summary>
      <div id="authorFilter" class="filter-group"></div>
    </details>

    <details>
      <summary>出版地區</summary>
      <div id="originCountryFilter" class="filter-group"></div>
    </details>


  </aside>

  <!-- RIGHT CONTENT -->
  <main class="content">
    <div id="pagination"></div>
    <div class="grid" id="mangalist">Loading...</div>
  </main>

</div>

<script>
// Disable right-click menu everywhere
document.addEventListener("contextmenu", (e) => e.preventDefault());

// ===== Configuration =====
const SHEET_URL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
let sheetData = [];
let currentPage = 1;
const itemsPerPage = 20;   // change this to 8, 16, etc.
let currentList = [];      // you already use this for modal nav

fetch(SHEET_URL)
  .then(res => res.json())
  .then(data => {
    sheetData = data.filter(row => row.Active?.toLowerCase() === "yes");
    populateTitles(); 
    populatePublishers();
    populateAuthors();
    populateOriginCountries();
    applyUrlFilters();
    applyFilters();
  })
  .catch(error => {
    document.getElementById("mangalist").innerHTML = "Failed to load data.";
    console.error(error);
  });

function renderPage() {
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = currentList.slice(start, end);

  const html = pageItems.map(row => `
    <div class="card" onclick="window.open('bookdetails.html?isbnhk=${row.ISBN}&isbnjp=${row.ISBN_JP}', '_blank')">
      <img src="${row.Image}" alt="${row.Title}">
      <h3>書名: ${row.Title} ${row.Volume}</h3>
      <h4>${row.Subtitle}</h4>
      <div>作者: ${row.Author}</div>
      <div>出版社: ${row.Publisher}</div>
      <div class="date">出版日期: ${row.IssueDate}</div>
      <div class="click-hint">點擊查看詳細資料</div> <!-- Hint for clicking -->
    </div>
  `).join("");

  document.getElementById("mangalist").innerHTML =
    pageItems.length ? html : "No Manga found.";

  renderPaginationControls();
}

</script>

</body>
</html>
