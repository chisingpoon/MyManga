<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>香港版漫畫資料</title>

<style>

body{
  font-family: Arial;
  padding:30px;
  background:#f5f5f5;
}

/* HEADER */

.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
  padding-bottom:15px;
  border-bottom:2px solid #eee;
}

.site-title{
  margin:0;
  font-size:24px;
}

.header-link{
  text-decoration:none;
  font-size:14px;
  padding:8px 14px;
  border-radius:6px;
  background:#f5f5f5;
  color:#333;
  transition:0.2s ease;
}

.header-link:hover{
  background:#333;
  color:white;
}

/* MOBILE HEADER */

@media(max-width:768px){

.page-header{
  flex-direction:column;
  align-items:flex-start;
  gap:10px;
}

.header-right{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

}

/* FILTER BUTTON */

#filterToggle{
  display:none;
  margin-bottom:10px;
  padding:10px 14px;
  border-radius:6px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

/* LAYOUT */

.layout{
  display:flex;
  gap:20px;
}

.sidebar{
  width:260px;
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  height:fit-content;
  font-size:13px;
}

.content{
  flex:1;
}

/* MOBILE LAYOUT */

@media(max-width:900px){

#filterToggle{
  display:block;
}

.layout{
  flex-direction:column;
}

.sidebar{
  display:none;
  width:100%;
}

.sidebar.show{
  display:block;
}

}

/* SIDEBAR */

.sidebar h3{
  margin-top:12px;
  margin-bottom:6px;
  font-size:14px;
}

.sidebar input,
.sidebar select{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.sidebar label{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:4px;
  font-size:13px;
  cursor:pointer;
}

.sidebar input[type="checkbox"]{
  width:auto;
  margin:0;
}

/* COLLAPSIBLE FILTERS */

.sidebar details{
  margin-bottom:10px;
  border-bottom:1px solid #eee;
  padding-bottom:8px;
}

.sidebar summary{
  font-weight:bold;
  cursor:pointer;
  list-style:none;
  font-size:14px;
  margin-bottom:6px;
}

.sidebar summary::-webkit-details-marker{
  display:none;
}

.sidebar summary::after{
  content:"▾";
  float:right;
  transition:transform 0.2s ease;
}

.sidebar details[open] summary::after{
  transform:rotate(180deg);
}

/* SEARCH */

.search-wrapper{
  position:relative;
  margin-bottom:6px;
}

.search-wrapper input{
  width:100%;
  box-sizing:border-box;
  padding:6px 28px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #ccc;
}

.clear-btn{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  cursor:pointer;
  color:#888;
  display:none;
}

.clear-btn:hover{
  color:#000;
}

/* FILTER LIST */

.filter-group{
  max-height:250px;
  overflow-y:auto;
  padding-right:5px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

@media(max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:420px){
.grid{
grid-template-columns:1fr;
}
}

/* CARD */

.card{
  background:white;
  border-radius:8px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:6px;
}

/* PAGINATION */

#pagination{
  margin-top:20px;
  text-align:center;
}

#pagination button{
  margin:4px;
  padding:8px 12px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
  border-radius:4px;
}

#pagination button:hover:not(:disabled){
  background:#f0f0f0;
}

#pagination button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.active-page{
  background:#333!important;
  color:white;
  font-weight:bold;
}

.ellipsis{
  margin:0 6px;
  color:#888;
}

/* MODAL */

.modal-box{
  background:white;
  width:90%;
  max-width:900px;
  margin:5% auto;
  padding:20px;
  border-radius:8px;
  position:relative;
  display:flex;
}

.detail-container{
  display:flex;
  gap:20px;
  align-items:stretch;
}

.detail-left{
  width:35%;
}

.detail-left img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.detail-right{
  width:65%;
}

@media(max-width:768px){

.detail-container{
flex-direction:column;
}

.detail-left,
.detail-right{
width:100%;
}

.modal-box{
width:95%;
margin:10% auto;
padding:15px;
}

}

.result-count{
  font-size:12px;
  color:#666;
  margin-bottom:10px;
}

</style>

</head>

<body>

<header class="page-header">

<div class="header-left">
<h1 class="site-title">香港版漫畫資料</h1>
</div>

<div class="header-right">
<a href="publishjp.html" class="header-link">日本版漫畫資料</a>
<a href="alloriginalworks.html" class="header-link">日本原作資料</a>
</div>

</header>

<button id="filterToggle" onclick="toggleFilters()">⚙️ 篩選</button>

<div class="layout">

<aside class="sidebar">

<button id="clearFiltersBtn" onclick="clearAllFilters()" style="margin-bottom:10px;width:100%;padding:6px 0;font-size:13px;border-radius:6px;border:1px solid #ccc;cursor:pointer;">
清除所有篩選
</button>

<h3>排序</h3>

<select id="sortIssueDate" onchange="applyFilters()">
<option value="">按出版日期</option>
<option value="newest">從新到舊</option>
<option value="oldest">從舊到新</option>
</select>

<select id="sortPrice" onchange="applyFilters()">
<option value="">按售價</option>
<option value="low">從低到高</option>
<option value="high">從高到低</option>
</select>

<h3>搜尋</h3>

<div class="search-wrapper">

<input type="text"
id="searchInput"
placeholder="任何文字搜尋..."
oninput="handleSearchInput()">

<span class="clear-btn" onclick="clearSearch()">×</span>

</div>

<div id="resultCount" class="result-count"></div>

<details>
<summary>書名</summary>
<div id="titleFilter" class="filter-group"></div>
</details>

<details>
<summary>出版社</summary>
<div id="publisherFilter" class="filter-group"></div>
</details>

<details>
<summary>作者</summary>
<div id="authorFilter" class="filter-group"></div>
</details>

<details>
<summary>出版地區</summary>
<div id="originCountryFilter" class="filter-group"></div>
</details>

</aside>

<main class="content">

<div id="pagination"></div>

<div class="grid" id="mangalist">
Loading...
</div>

</main>

</div>

<script>

function toggleFilters(){
const sidebar=document.querySelector(".sidebar");
sidebar.classList.toggle("show");
}

</script>

</body>
</html>
