<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Viewer</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:20px;
background:#f3f3f3;
}

/* ---------- TOP SECTION ---------- */

#topSection{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
gap:20px;
margin-bottom:30px;
align-items:stretch;
}

/* ---------- CARD ---------- */

.card{

background:white;
border-radius:10px;
padding:18px;

box-shadow:0 3px 8px rgba(0,0,0,0.15);

display:flex;
gap:20px;

height:100%;
min-height:260px;
}

/* IMAGE SIDE */

.card img{

height:100%;
width:auto;

max-width:220px;

object-fit:contain;

user-select:none;
pointer-events:none;
}

/* TEXT SIDE */

.cardContent{
flex:1;
overflow:auto;
}

.cardContent h2{
margin:0 0 12px 0;
font-size:clamp(22px,2vw,32px);
}

.field{
font-size:14px;
margin:3px 0;
}

/* ---------- TABLE ---------- */

#bottomSection{
display:none;

background:white;
padding:20px;
border-radius:10px;

box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:6px 10px;
white-space:nowrap;
}

th{
background:#eee;
}

/* ---------- MOBILE ---------- */

@media (max-width:700px){

.card{
flex-direction:column;
align-items:center;
}

.card img{
height:auto;
max-height:250px;
}

}

</style>
</head>

<body>

<div id="topSection">
<div id="hkCard"></div>
<div id="jpCard"></div>
</div>

<div id="bottomSection">
<h2>收錄作品</h2>
<table id="worksTable"></table>
</div>

<script>

/* ---------- CONFIG ---------- */

const tableColumns=[

"作品番",
"類",
"番",
"巻",
"收錄話",
"收錄頁",
"出版副題",
"收錄初出掲載誌",
"收錄初出掲載号",
"出版備考",
"副題港譯",
"色"

];

/* ---------- URL PARAMETERS ---------- */

const params=new URLSearchParams(location.search);

const ISBNHK=params.get("ISBNHK");
const ISBNJP=params.get("ISBNJP");

/* ---------- DATA SOURCES ---------- */

const hkURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const jpURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const worksURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const masterURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

/* ---------- CREATE CARD ---------- */

function createCard(data,titleField){

let card=document.createElement("div");
card.className="card";

let img=document.createElement("img");
img.src=data.Image||"";

let content=document.createElement("div");
content.className="cardContent";

let title=document.createElement("h2");
title.textContent=data[titleField]||"";

content.appendChild(title);

for(let key in data){

if(key===titleField || key==="Image") continue;

let field=document.createElement("div");
field.className="field";

field.innerHTML="<b>"+key+"</b>: "+data[key];

content.appendChild(field);

}

card.appendChild(img);
card.appendChild(content);

return card;

}

/* ---------- LOAD HK ---------- */

async function loadHK(){

if(!ISBNHK) return;

let data=await (await fetch(hkURL)).json();

let row=data.find(r=>r.ISBN===ISBNHK);

if(row){

let card=createCard(row,"Title");

document.getElementById("hkCard").appendChild(card);

}

}

/* ---------- LOAD JP ---------- */

async function loadJP(){

if(!ISBNJP) return;

let data=await (await fetch(jpURL)).json();

let row=data.find(r=>r.ISBN===ISBNJP);

if(row){

let card=createCard(row,"標題");

document.getElementById("jpCard").appendChild(card);

}

}

/* ---------- LOAD TABLE ---------- */

async function loadTable(){

if(!ISBNJP) return;

document.getElementById("bottomSection").style.display="block";

let works=await (await fetch(worksURL)).json();
let master=await (await fetch(masterURL)).json();

/* build lookup */

let masterMap={};

master.forEach(m=>{
masterMap[m["作品番"]]=m;
});

/* filter */

let filtered=works.filter(r=>r.ISBN===ISBNJP);

/* join */

filtered=filtered.map(w=>{
let m=masterMap[w["作品番"]]||{};
return {...w,...m};
});

/* sort */

filtered.sort((a,b)=>Number(a["收錄話"])-Number(b["收錄話"]));

let table=document.getElementById("worksTable");

/* header */

let html="<tr>";

tableColumns.forEach(c=>{
html+="<th>"+c+"</th>";
});

html+="</tr>";

/* rows */

filtered.forEach(r=>{

html+="<tr>";

tableColumns.forEach(c=>{
html+="<td>"+(r[c]||"")+"</td>";
});

html+="</tr>";

});

table.innerHTML=html;

}

/* ---------- SECURITY ---------- */

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("dragstart",e=>{
if(e.target.tagName==="IMG") e.preventDefault();
});

/* ---------- RUN ---------- */

Promise.all([
loadHK(),
loadJP(),
loadTable()
]);

</script>

</body>
</html>
