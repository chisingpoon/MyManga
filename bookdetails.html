<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Viewer</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:20px;
background:#f4f4f4;
}

/* ---------- CARD LAYOUT ---------- */

#topSection{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
border-radius:8px;
padding:15px;
flex:1;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
display:flex;
gap:20px;
align-items:stretch;
}

.card img{
height:100%;
max-height:260px;
object-fit:contain;
user-select:none;
pointer-events:none;
}

.cardContent{
flex:1;
}

.cardContent h2{
margin-top:0;
font-size:26px;
}

.field{
margin:3px 0;
font-size:14px;
}

/* ---------- TABLE ---------- */

#bottomSection{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:6px 10px;
white-space:nowrap;
}

th{
background:#eee;
}

</style>
</head>

<body>

<div id="topSection">
<div id="hkCard"></div>
<div id="jpCard"></div>
</div>

<div id="bottomSection" style="display:none">
<h2>收錄作品</h2>
<table id="worksTable"></table>
</div>

<script>

/* ---------- CONFIG ---------- */

/* hide/show columns here */
const tableColumns = [
"作品番",
"類",
"番",
"巻",
"收錄話",
"收錄頁",
"出版副題",
"收錄初出掲載誌",
"收錄初出掲載号",
"出版備考",
"副題港譯",
"色"
];

/* ---------- SPREADSHEET URLs ---------- */

const hkURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const jpURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const worksURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const masterURL="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

/* ---------- URL PARAMETERS ---------- */

const params=new URLSearchParams(location.search);
const ISBNHK=params.get("ISBNHK");
const ISBNJP=params.get("ISBNJP");

/* ---------- CREATE CARD ---------- */

function createCard(data,titleField){

let card=document.createElement("div");
card.className="card";

let img=document.createElement("img");
img.src=data.Image||"";

let content=document.createElement("div");
content.className="cardContent";

let title=document.createElement("h2");
title.textContent=data[titleField]||"";

content.appendChild(title);

for(let key in data){
if(key===titleField||key==="Image") continue;

let div=document.createElement("div");
div.className="field";
div.innerHTML="<b>"+key+"</b>: "+data[key];
content.appendChild(div);
}

card.appendChild(img);
card.appendChild(content);

return card;
}

/* ---------- LOAD HK ---------- */

async function loadHK(){

if(!ISBNHK) return;

let res=await fetch(hkURL);
let data=await res.json();

let row=data.find(r=>r.ISBN===ISBNHK);

if(row){

let card=createCard(row,"Title");
document.getElementById("hkCard").appendChild(card);

}

}

/* ---------- LOAD JP ---------- */

async function loadJP(){

if(!ISBNJP) return;

let res=await fetch(jpURL);
let data=await res.json();

let row=data.find(r=>r.ISBN===ISBNJP);

if(row){

let card=createCard(row,"標題");
document.getElementById("jpCard").appendChild(card);

}

}

/* ---------- LOAD TABLE ---------- */

async function loadTable(){

if(!ISBNJP) return;

document.getElementById("bottomSection").style.display="block";

let works=await (await fetch(worksURL)).json();
let master=await (await fetch(masterURL)).json();

let filtered=works.filter(r=>r.ISBN===ISBNJP);

/* join tables */
filtered=filtered.map(w=>{
let m=master.find(x=>x["作品番"]===w["作品番"]);
return {...w,...m};
});

/* sort */
filtered.sort((a,b)=>Number(a["收錄話"])-Number(b["收錄話"]));

let table=document.getElementById("worksTable");

/* header */

let thead="<tr>";
tableColumns.forEach(c=>{
thead+="<th>"+c+"</th>";
});
thead+="</tr>";

/* rows */

let rows="";

filtered.forEach(r=>{
rows+="<tr>";
tableColumns.forEach(c=>{
rows+="<td>"+(r[c]||"")+"</td>";
});
rows+="</tr>";
});

table.innerHTML=thead+rows;

}

/* ---------- SECURITY ---------- */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* ---------- RUN ---------- */

loadHK();
loadJP();
loadTable();

</script>

</body>
</html>
