<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Viewer</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 20px;
      background: #f3f3f3;
    }

    /* ---------- TOP SECTION ---------- */
    #topSection {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 40px;
      margin-bottom: 40px;
    }

    /* ---------- CARD ---------- */
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: row;
      gap: 20px;
      align-items: stretch; /* ensure content stretches to fill */
      height: auto;
    }

    /* IMAGE BOX */
    .book-image {
      flex: 0 0 160px; /* fixed width */
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
      height: 100%; /* Image box fills the full height of the card */
    }

    /* FIX: Auto-fit the image height while maintaining aspect ratio */
    .book-image img {
      height: 100%; /* Ensure the image fills the height of the card */
      width: auto;  /* Keep aspect ratio intact */
      object-fit: contain;  /* Ensure the image does not stretch */
      display: block;
    }

    /* TEXT */
    .cardContent {
      font-size: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .field {
      margin: 3px 0;
    }

    /* ---------- TABLE ---------- */
    #bottomSection {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: auto;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: #eee;
      white-space: nowrap;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .card {
        flex-direction: column;
        align-items: center;
      }

      .book-image {
        width: 100%;
        height: auto;
      }

      .book-image img {
        width: auto;
        max-height: 250px;
      }
    }
  </style>
</head>
<body>
  <div id="topSection"></div>

  <div id="bottomSection">
    <h2>收錄作品</h2>
    <table id="worksTable"></table>
  </div>

  <script>
    const hkCardFieldLabels = {
      "Title": "書名",
      "Volume": "卷數",
      "Subtitle": "副標題",
      "Author": "作者",
      "Publisher": "出版社",
      "Price": "定價",
      "Page": "頁數",
      "IssueDate": "發行日期",
      "Size": "尺寸",
      "RetailPoint": "零售點",
      "ISBN": "ISBN",
      "OriginalTitle": "原書名",
      "OriginalSubtitle": "原副標題",
      "OriginCountry": "原產地",
      "ISBN_JP": "日本ISBN",
      "Active": "是否上架",
      "Sold": "已售數"
    };

    const jpCardFieldLabels = {
      "標題": "タイトル",
      "巻": "巻数",
      "副標題": "サブタイトル",
      "著": "著者",
      "出版社": "出版社",
      "定価": "定価",
      "頁": "ページ",
      "初版発行日": "初版発行日",
      "判型": "判型",
      "ISBN": "ISBN",
      "Active": "販売中",
      "Image": "画像"
    };

    const hkURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目錄HK";
    const jpURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目錄JP";

    async function fetchWithCache(url) {
      let cache = localStorage.getItem(url);
      if (cache) {
        let obj = JSON.parse(cache);
        if (Date.now() - obj.time < 600000) {  // 10 min cache time
          return obj.data;
        }
      }
      const data = await (await fetch(url)).json();
      localStorage.setItem(url, JSON.stringify({ time: Date.now(), data: data }));
      return data;
    }

    async function loadHK() {
      const ISBNHK = new URLSearchParams(location.search).get("ISBNHK");
      if (!ISBNHK) return;

      const data = await fetchWithCache(hkURL);
      const row = data.find(r => r.ISBN === ISBNHK);
      if (row) {
        const card = createCard(row, "Title", hkCardFieldLabels);
        document.getElementById("topSection").appendChild(card);
      }
    }

    async function loadJP() {
      const ISBNJP = new URLSearchParams(location.search).get("ISBNJP");
      if (!ISBNJP) return;

      const data = await fetchWithCache(jpURL);
      const row = data.find(r => r.ISBN === ISBNJP);
      if (row) {
        const card = createCard(row, "標題", jpCardFieldLabels);
        document.getElementById("topSection").appendChild(card);
      }
    }

    function createCard(data, titleField, labelMap) {
      const card = document.createElement("div");
      card.className = "card";

      const imageBox = document.createElement("div");
      imageBox.className = "book-image";
      const img = document.createElement("img");
      img.src = data.Image || "";
      imageBox.appendChild(img);

      const content = document.createElement("div");
      content.className = "cardContent";

      const title = document.createElement("h2");
      title.textContent = data[titleField] || "";
      content.appendChild(title);

      for (let k in data) {
        if (k === titleField || k === "Image") continue;

        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = "<b>" + (labelMap[k] || k) + "</b>: " + (data[k] || "");
        content.appendChild(div);
      }

      card.appendChild(imageBox);
      card.appendChild(content);

      return card;
    }

    async function init() {
      await loadHK();
      await loadJP();
    }

    init();
  </script>
</body>
</html>
