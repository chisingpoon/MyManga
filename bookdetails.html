<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1, h2 { margin-bottom: 16px; }

  /* Cards layout */
  #cards-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
  .card {
    display: flex;
    flex-direction: row;
    gap: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    flex: 1 1 300px;
    min-width: 300px;
    max-width: 600px;
    align-items: stretch; /* make image and text same height */
  }
  
  .card img {
    width: auto;
    height: auto;
    max-height: 100%;  /* fit image to the tallest content in card */
    object-fit: contain;
    border-radius: 4px;
    align-self: flex-start; /* image will scale but not overflow */
  }
  
  .card .card-data {
    flex: 1;  /* allow text column to grow */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .card-data h3 { margin-top: 0; }
  .card-data .field { display: flex; gap: 6px; margin-bottom: 4px; }

  /* Table layout */
  #table-wrapper { overflow-x: auto; border: 1px solid #ccc; }
  table { border-collapse: collapse; width: 100%; min-width: 1400px; }
  th, td { padding: 8px; border: 1px solid #ccc; text-align: left; }
  th { position: sticky; top: 0; background-color: #f0f0f0; }
  .nowrap { white-space: nowrap; }
</style>
