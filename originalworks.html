<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Refined View</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { -webkit-user-select: none; user-select: none; }
        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        td, th { white-space: nowrap; }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen relative overflow-x-hidden" oncontextmenu="return false;">

    <div id="app" v-cloak>
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-[98%] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg hover:scale-105 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter text-slate-800 uppercase">Master Archive</h1>
                </div>
            </div>
        </header>

        <main class="max-w-[98%] mx-auto py-6 px-4">
            
            <div v-if="loading" class="flex flex-col items-center justify-center py-32">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mapping Relational Data...</p>
            </div>

            <div v-else>
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-4">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Search Keywords</label>
                            <input type="text" v-model="searchQuery" placeholder="Search title or remarks..." 
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>

                        <div class="lg:col-span-3 space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Magazine Filter</label>
                            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto filter-scroll p-1">
                                <button v-for="(count, mag) in magazineStats" :key="mag" 
                                    @click="toggleMagazine(mag)"
                                    :class="activeMagazines.includes(mag) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200'"
                                    class="px-3 py-1.5 rounded-xl border text-[11px] font-bold transition-all shadow-sm flex items-center gap-2">
                                    {{ mag }} <span class="opacity-50 text-[9px]">{{ count }}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="px-6 py-3 mb-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl flex items-center justify-between">
                    <span class="text-[11px] font-black text-indigo-900 uppercase tracking-widest">Showing {{ filteredData.length }} Records</span>
                    <button @click="resetFilters" class="text-[9px] font-black text-indigo-500 uppercase hover:underline">Clear Filters</button>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b bg-slate-50">
                                <tr>
                                    <th class="px-6 py-5">掲載番</th>
                                    <th class="px-6 py-5">初出副題</th>
                                    <th class="px-6 py-5">初出掲載誌</th>
                                    <th class="px-6 py-5">初出掲載号</th>
                                    <th class="px-6 py-5">初出掲載頁</th>
                                    <th class="px-6 py-5 text-center bg-indigo-50/30 text-indigo-600">大全集</th>
                                    <th class="px-6 py-5">頁</th>
                                    <th class="px-6 py-5">備考</th>
                                </tr>
                            </thead>
                            <tbody class="text-[13px] divide-y divide-slate-50">
                                <tr v-for="row in paginatedData" :key="row.作品番" class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-6 py-5 font-bold text-slate-400">{{ row.掲載番 }}</td>
                                    <td class="px-6 py-5 font-black text-slate-900">{{ row.初出副題 }}</td>
                                    <td class="px-6 py-5 font-bold text-slate-600">{{ row.初出掲載誌 }}</td>
                                    <td class="px-6 py-5 text-slate-500">{{ row.初出掲載号 }}</td>
                                    <td class="px-6 py-5 text-slate-500">{{ row.初出掲載頁 }}</td>
                                    
                                    <td class="px-6 py-5 text-center">
                                        <template v-if="getDQSMapping(row.作品番)">
                                            <a :href="'publishjp.html?isbn=' + getDQSMapping(row.作品番).ISBN" 
                                               class="inline-flex items-center justify-center bg-indigo-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-black hover:bg-indigo-700 transition-all shadow-sm">
                                                Vol. {{ getDQSMapping(row.作品番).巻 }}
                                            </a>
                                        </template>
                                        <span v-else class="text-slate-200">-</span>
                                    </td>

                                    <td class="px-6 py-5 text-slate-500">{{ row.頁 }}</td>
                                    <td class="px-6 py-5 text-slate-400 italic text-[11px] truncate max-w-xs">{{ row.備考 }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="p-6 border-t bg-slate-50/50 flex items-center justify-between">
                        <button @click="currentPage--" :disabled="currentPage === 1" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20 hover:shadow-sm transition-all">PREV</button>
                        <span class="text-[10px] font-black text-slate-400 uppercase">Page {{ currentPage }} / {{ totalPages }}</span>
                        <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20 hover:shadow-sm transition-all">NEXT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '', activeMagazines: [],
                    currentPage: 1, itemsPerPage: 50,
                    master: [], contents: [], books: []
                }
            },
            watch: {
                searchQuery() { this.updateURL(); this.currentPage = 1; },
                activeMagazines: { handler() { this.updateURL(); this.currentPage = 1; }, deep: true }
            },
            computed: {
                magazineStats() {
                    const stats = {};
                    this.master.forEach(r => {
                        if (r.初出掲載誌) {
                            const name = r.初出掲載誌.trim();
                            stats[name] = (stats[name] || 0) + 1;
                        }
                    });
                    return stats;
                },
                filteredData() {
                    const q = this.searchQuery.toLowerCase().trim();
                    const hasMags = this.activeMagazines.length > 0;
                    return this.master.filter(r => {
                        const matchesText = !q || (r.初出副題||'').toLowerCase().includes(q) || (r.備考||'').toLowerCase().includes(q);
                        const matchesMag = !hasMags || this.activeMagazines.includes(r.初出掲載誌?.trim());
                        return matchesText && matchesMag;
                    });
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    try {
                        const [m, c, b] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP").then(r => r.json())
                        ]);
                        this.master = m;
                        this.contents = c;
                        this.books = b;

                        // URL Parameter Sync
                        const p = new URLSearchParams(window.location.search);
                        if (p.get('q')) this.searchQuery = decodeURIComponent(p.get('q'));
                        if (p.get('mag')) {
                            const requested = p.get('mag').split(',').map(m => decodeURIComponent(m).trim());
                            this.activeMagazines = requested.filter(m => this.magazineStats[m]);
                        }
                    } catch (e) { console.error(e); } finally { this.loading = false; }
                },
                getDQSMapping(workId) {
                    if (!workId) return null;
                    // Find appearance in contents where type is 大全集 or 大長編大全集
                    const appearance = this.contents.find(c => {
                        if (c.作品番?.toString().trim() !== workId.toString().trim()) return false;
                        const book = this.books.find(b => b.ISBN === c.ISBN);
                        return book && (book.類 === "大全集" || book.類 === "大長編大全集");
                    });
                    if (!appearance) return null;
                    const bookInfo = this.books.find(b => b.ISBN === appearance.ISBN);
                    return bookInfo ? { 巻: bookInfo.巻, ISBN: bookInfo.ISBN } : null;
                },
                toggleMagazine(mag) {
                    const idx = this.activeMagazines.indexOf(mag);
                    if (idx > -1) this.activeMagazines.splice(idx, 1);
                    else this.activeMagazines.push(mag);
                },
                resetFilters() {
                    this.searchQuery = ''; this.activeMagazines = []; this.currentPage = 1;
                },
                updateURL() {
                    const url = new URL(window.location);
                    if (this.searchQuery) url.searchParams.set('q', this.searchQuery); else url.searchParams.delete('q');
                    if (this.activeMagazines.length > 0) url.searchParams.set('mag', this.activeMagazines.join(',')); else url.searchParams.delete('mag');
                    window.history.replaceState({}, '', url);
                }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
