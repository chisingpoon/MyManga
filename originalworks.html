<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Search & Filter</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { -webkit-user-select: none; user-select: none; }
        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen" oncontextmenu="return false;">

    <div id="app" v-cloak>
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-[98%] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg hover:scale-105 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter text-slate-800 uppercase">Master Archive</h1>
                </div>
            </div>
        </header>

        <main class="max-w-[98%] mx-auto py-6 px-4">
            
            <div v-if="loading" class="flex flex-col items-center justify-center py-32">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest tracking-widest">Loading Master Records...</p>
            </div>

            <div v-else>
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-8">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Search</label>
                            <div class="relative">
                                <input type="text" v-model="searchQuery" placeholder="Search titles, IDs..." 
                                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
                            </div>
                            <button @click="resetFilters" class="text-[10px] font-black text-indigo-600 hover:underline uppercase">Reset All Filters</button>
                        </div>

                        <div class="lg:col-span-2 space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">
                                Filter by Magazine (初出掲載誌)
                                <span class="text-indigo-600 font-black">{{ activeMagazines.length }} selected</span>
                            </label>
                            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto filter-scroll p-1">
                                <button v-for="mag in magazineOptions" :key="mag" 
                                    @click="toggleMagazine(mag)"
                                    :class="activeMagazines.includes(mag) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-500 border-slate-200 hover:border-indigo-300'"
                                    class="px-3 py-1.5 rounded-lg border text-[11px] font-bold transition-all shadow-sm">
                                    {{ mag }}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b bg-slate-50">
                                <tr>
                                    <th class="px-6 py-5 w-20">#</th>
                                    <th class="px-6 py-5 w-80">Title</th>
                                    <th class="px-6 py-5 w-40">Magazine</th>
                                    <th v-for="col in mappingColumns" :key="col" class="px-6 py-5 bg-indigo-50/20 text-indigo-500 border-x border-slate-100/30 text-center">
                                        {{ col }}
                                    </th>
                                    <th class="px-6 py-5">Remarks</th>
                                </tr>
                            </thead>
                            <tbody class="text-[13px] divide-y divide-slate-50">
                                <tr v-for="row in paginatedData" :key="row.作品番" class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-6 py-5 font-black text-slate-300">{{ row.作品番 }}</td>
                                    <td class="px-6 py-5">
                                        <div class="font-black text-slate-900 leading-tight">{{ row.初出副題 }}</div>
                                        <div class="text-[11px] text-slate-400 font-bold mt-1 uppercase">{{ row.全集副題 }}</div>
                                    </td>
                                    <td class="px-6 py-5 font-bold text-slate-600">
                                        {{ row.初出掲載誌 }}
                                    </td>
                                    
                                    <td v-for="col in mappingColumns" :key="col" class="px-6 py-5 border-x border-slate-50/50">
                                        <template v-if="getMapping(row.作品番, col)">
                                            <a :href="'publishjp.html?isbn=' + getMapping(row.作品番, col).ISBN" 
                                               class="flex items-center justify-center bg-white border border-indigo-100 px-3 py-1.5 rounded-xl shadow-sm hover:border-indigo-500 hover:bg-indigo-50 transition-all">
                                                <span class="font-black text-indigo-600 text-[11px]">Vol. {{ getMapping(row.作品番, col).巻 }}</span>
                                            </a>
                                        </template>
                                        <div v-else class="text-center text-slate-200">-</div>
                                    </td>

                                    <td class="px-6 py-5 text-slate-400 italic text-[11px]">{{ row.備考 }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="p-6 border-t bg-slate-50/50 flex items-center justify-between">
                        <button @click="currentPage--" :disabled="currentPage === 1" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20">PREV</button>
                        <span class="text-[10px] font-black text-slate-400 uppercase">Page {{ currentPage }} / {{ totalPages }} ({{ filteredData.length }} results)</span>
                        <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20">NEXT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    activeMagazines: [],
                    currentPage: 1,
                    itemsPerPage: 50,
                    master: [], contents: [], books: [],
                    mappingColumns: ["単行本", "第0巻", "ドラミちゃん", "大全集"]
                }
            },
            watch: {
                // Keep URL updated with both Search and Magazine Filters
                searchQuery() { this.updateURL(); },
                activeMagazines: {
                    handler() { this.updateURL(); },
                    deep: true
                }
            },
            computed: {
                magazineOptions() {
                    const mags = this.master.map(r => r.初出掲載誌).filter(Boolean);
                    return [...new Set(mags)].sort();
                },
                filteredData() {
                    let data = this.master;
                    
                    // Filter 1: Text Search
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        data = data.filter(r => 
                            (r.初出副題||'').toLowerCase().includes(q) || 
                            (r.全集副題||'').toLowerCase().includes(q) ||
                            (r.作品番||'').toString().includes(q)
                        );
                    }

                    // Filter 2: Magazine Checkboxes
                    if (this.activeMagazines.length > 0) {
                        data = data.filter(r => this.activeMagazines.includes(r.初出掲載誌));
                    }

                    return data;
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    try {
                        const [m, c, b] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP").then(r => r.json())
                        ]);
                        this.master = m.filter(r => r.作品番);
                        this.contents = c;
                        this.books = b;
                    } catch (e) { console.error(e); } finally { this.loading = false; }
                },
                getMapping(id, cat) {
                    const app = this.contents.find(c => {
                        if (c.作品番?.toString().trim() !== id?.toString().trim()) return false;
                        const book = this.books.find(b => b.ISBN === c.ISBN);
                        return book && book.類 === cat;
                    });
                    if (!app) return null;
                    const bInfo = this.books.find(b => b.ISBN === app.ISBN);
                    return { 巻: bInfo.巻, ISBN: bInfo.ISBN };
                },
                toggleMagazine(mag) {
                    const index = this.activeMagazines.indexOf(mag);
                    if (index > -1) this.activeMagazines.splice(index, 1);
                    else this.activeMagazines.push(mag);
                    this.currentPage = 1;
                },
                resetFilters() {
                    this.searchQuery = '';
                    this.activeMagazines = [];
                    this.currentPage = 1;
                },
                updateURL() {
                    const url = new URL(window.location);
                    if (this.searchQuery) url.searchParams.set('q', this.searchQuery);
                    else url.searchParams.delete('q');
                    
                    if (this.activeMagazines.length > 0) url.searchParams.set('mag', this.activeMagazines.join(','));
                    else url.searchParams.delete('mag');
                    
                    window.history.replaceState({}, '', url);
                }
            },
            mounted() {
                this.init().then(() => {
                    const params = new URLSearchParams(window.location.search);
                    // Load Text Search from URL
                    if (params.get('q')) this.searchQuery = decodeURIComponent(params.get('q'));
                    // Load Magazine Filter from URL (e.g. ?mag=小学一年生,小学二年生)
                    if (params.get('mag')) this.activeMagazines = params.get('mag').split(',');
                });
            }
        }).mount('#app')
    </script>
</body>
</html>
