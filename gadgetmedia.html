    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true, searchQuery: '', selectedMovie: '',
                    selectedGrandType: '', selectedStandardTitle: '',
                    selectedGadgetId: null,
                    currentPage: 1, itemsPerPage: 30,
                    gadgetsMaster: [], gadgetMedia: [], movies: [], contents: [], publishHk: []
                }
            },
            computed: {
                searchFiltered() {
                    if (this.loading) return [];
                    const q = this.searchQuery.toLowerCase();
                    
                    return this.gadgetsMaster.filter(g => {
                        if (g['Active']?.toLowerCase() !== 'yes') return false;
                        
                        // FIX: Ensure Gadget ID comparison is string-to-string
                        if (this.selectedGadgetId && String(g['Gadget ID']).trim() !== String(this.selectedGadgetId).trim()) {
                            return false;
                        }

                        if (!q) return true;
                        const relatedMedia = this.gadgetMedia.filter(m => String(m['Gadget ID']) === String(g['Gadget ID']));
                        const text = (g['JP Title'] + ' ' + relatedMedia.map(m => `${m['HK Translation']} ${m['CultureCom Trans']} ${m['HKChingWin Trans']}`).join(' ')).toLowerCase();
                        return text.includes(q);
                    });
                },
                // ... (Keep dynamicMovies, dynamicGrandTypes, dynamicStandardTitles computed properties) ...
                
                filteredData() {
                    return this.searchFiltered.filter(g => {
                        const appearances = this.gadgetMedia.filter(m => String(m['Gadget ID']) === String(g['Gadget ID']));
                        
                        // FIX: Ensure Movie ID comparison is string-to-string
                        if (this.selectedMovie) {
                            const hasMovie = appearances.some(a => String(a['Movie ID']).trim() === String(this.selectedMovie).trim());
                            if (!hasMovie) return false;
                        }

                        if (this.selectedGrandType && !this.getMangaData(g, true).some(b => b.type === this.selectedGrandType)) return false;
                        if (this.selectedStandardTitle && !this.getMangaData(g, false).some(b => b.title === this.selectedStandardTitle)) return false;
                        return true;
                    }).map(g => ({ ...g, appearances: this.gadgetMedia.filter(m => String(m['Gadget ID']) === String(g['Gadget ID'])) }));
                },
                // ... (Keep paginatedData, totalPages, paginationRange) ...
            },
            methods: {
                async init() {
                    try {
                        const baseUrl = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                        const [g, gm, m, s, h] = await Promise.all([
                            fetch(baseUrl + "法寶").then(r => r.json()), fetch(baseUrl + "媒體與法寶").then(r => r.json()),
                            fetch(baseUrl + "電影動畫").then(r => r.json()), fetch(baseUrl + "書籍收錄作品").then(r => r.json()),
                            fetch(baseUrl + "出版目録HK").then(r => r.json())
                        ]);
                        
                        // Assign data first
                        this.gadgetsMaster = g; 
                        this.gadgetMedia = gm; 
                        this.movies = m; 
                        this.contents = s; 
                        this.publishHk = h;
                        
                        // Then trigger params check
                        this.checkUrlParams(); 
                        this.loading = false;
                    } catch (e) { console.error("Initialization Error:", e); }
                },
                checkUrlParams() {
                    const params = new URLSearchParams(window.location.search);
                    // Use .get() and ensure it's handled as a string
                    const gid = params.get('gadgetid');
                    const mid = params.get('movieid');
                    
                    if (gid) {
                        this.selectedGadgetId = gid.trim();
                    }
                    if (mid) {
                        this.selectedMovie = mid.trim();
                    }
                },
                // ... (Keep handleManualInput, getMangaData, getMovieData, getUniquePubTrans, resetFilters, changePage) ...
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
