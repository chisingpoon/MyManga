<aside class="w-72 border-r bg-white/50 backdrop-blur-sm overflow-y-auto p-6 hidden lg:block space-y-6">
    <div class="flex items-center justify-between border-b pb-4">
        <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest">Filters</h3>
        <button onclick="clearSearch()" class="text-[10px] font-black text-blue-600 hover:bg-blue-50 px-2 py-1 rounded transition-colors">RESET ALL</button>
    </div>

    <div class="space-y-3">
        <div class="flex justify-between items-center">
            <label class="text-[11px] font-black text-slate-500 uppercase tracking-tight">初出掲載誌</label>
            <div class="flex gap-2">
                <button onclick="toggleAll('magazineFilter', true)" class="text-[9px] font-bold text-slate-400 hover:text-blue-600">ALL</button>
                <button onclick="toggleAll('magazineFilter', false)" class="text-[9px] font-bold text-slate-400 hover:text-red-600">NONE</button>
            </div>
        </div>
        <input type="text" id="magSearch" oninput="filterCheckboxes('magazineFilter', this.value)" 
               placeholder="Search magazines..." 
               class="w-full text-[11px] bg-slate-100 border-none rounded-md px-3 py-2 focus:ring-1 focus:ring-blue-400 outline-none">
        <div id="magazineFilter" class="checkbox-container space-y-1 max-h-60 overflow-y-auto pr-2 border-b pb-4"></div>
    </div>

    <div class="space-y-3">
        <div class="flex justify-between items-center">
            <label class="text-[11px] font-black text-slate-500 uppercase tracking-tight">単行本系列</label>
            <div class="flex gap-2">
                <button onclick="toggleAll('tankobonFilter', true)" class="text-[9px] font-bold text-slate-400 hover:text-blue-600">ALL</button>
                <button onclick="toggleAll('tankobonFilter', false)" class="text-[9px] font-bold text-slate-400 hover:text-red-600">NONE</button>
            </div>
        </div>
        <div id="tankobonFilter" class="checkbox-container space-y-1 max-h-48 overflow-y-auto pr-2 border-b pb-4"></div>
    </div>

    <div class="space-y-3">
        <div class="flex justify-between items-center">
            <label class="text-[11px] font-black text-slate-500 uppercase tracking-tight">大全集</label>
            <div class="flex gap-2">
                <button onclick="toggleAll('completeCollectionFilter', true)" class="text-[9px] font-bold text-slate-400 hover:text-blue-600">ALL</button>
                <button onclick="toggleAll('completeCollectionFilter', false)" class="text-[9px] font-bold text-slate-400 hover:text-red-600">NONE</button>
            </div>
        </div>
        <div id="completeCollectionFilter" class="checkbox-container space-y-1 max-h-40 overflow-y-auto pr-2"></div>
    </div>
</aside>
